version: "3.9"

services:

  web:
    build: .
    container_name: notes_app
    ports:
      - "8080:80"

    volumes:
      - .:/var/www/html

    depends_on:
      - db

  db:
    image: mysql:8.0

    container_name: notes_database

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: NoteApp
      MYSQL_USER: notesuser
      MYSQL_PASSWORD: notespassword

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data: